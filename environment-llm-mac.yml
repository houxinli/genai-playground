name: llm
channels:
  - defaults
dependencies:
  - python=3.10
  - pip
  - readline
  - tk
  - xz
  - zlib
  - pip:
      # 仅客户端依赖（Mac 无 CUDA/vLLM 服务端）
      - openai==1.102.0
      - httpx==0.28.1
      - requests==2.32.5
      - pyyaml==6.0.2
      - tqdm==4.67.1
      - rich==14.1.0
      - python-dotenv==1.1.1
      # 文本与工具
      - regex==2025.7.34
      - tiktoken==0.11.0
      # Pixiv 下载脚本依赖
      - pixivpy3
      - beautifulsoup4
      - html5lib
      # 日志与测试（可选）
      - python-json-logger==3.3.0
      - pytest==8.3.3
      # 兼容性：不安装任何 nvidia/cuda/xformers/vllm
## 提示：如需固定安装路径，可自行添加 prefix 字段；默认由 conda 管理

