name: tests

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

jobs:
  unittest:
    runs-on: ubuntu-latest
    env:
      # Avoid any remote tokenizer download during translation token estimation.
      TRANSLATION_FORCE_SIMPLE_ESTIMATOR: "1"
      TRANSLATION_SKIP_REMOTE_TOKENIZER: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install CI dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: Agent harness validation
        run: |
          python -m unittest scripts.validate_agent_tasks_test scripts.bootstrap_agent_task_test scripts.check_docs_drift_test
          python scripts/validate_agent_tasks.py

      - name: Docs drift gate
        run: |
          python scripts/check_docs_drift.py

      - name: Design-doc coupling (PR only)
        if: github.event_name == 'pull_request'
        run: |
          git fetch origin "${{ github.base_ref }}" --depth=1 || exit 0
          # 两参 diff 直接比两棵树,浅克隆也成立(三点 diff 需 merge-base)
          CHANGED=$(git diff --name-only "origin/${{ github.base_ref }}" HEAD) || exit 0
          NEEDS_DESIGN=$(echo "$CHANGED" | grep -E '^tasks/translation/schemas/|^tasks/translation/src/core/[^/]+\.py$' | grep -v '_test\.py' || true)
          TOUCHED_DESIGN=$(echo "$CHANGED" | grep -E '^tasks/translation/docs/system-design\.md$|^docs/PROJECT_STATUS\.md$' || true)
          if [ -n "$NEEDS_DESIGN" ] && [ -z "$TOUCHED_DESIGN" ]; then
            echo "::error::改了 schema/core 模块却没更新 system-design.md 或 PROJECT_STATUS.md(设计跟代码同 PR 走):"
            echo "$NEEDS_DESIGN"
            exit 1
          fi

      - name: Translation test suite
        # pytest 统跑:unittest discover 不执行 parser/prompt 下的 pytest 风格用例
        run: |
          python -m pytest tasks/translation/src -q

      - name: Sunday Movies offline tests
        run: |
          cd tasks/sunday-movies/src
          python -m unittest ratings.tests.utils_test ratings.tests.test_aggregator \
            collectors.amc_test collectors.fandango_test ratings.tests.rottentomatoes_fetcher_test
