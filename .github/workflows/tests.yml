name: tests

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

jobs:
  unittest:
    runs-on: ubuntu-latest
    env:
      # Avoid any remote tokenizer download during translation token estimation.
      TRANSLATION_FORCE_SIMPLE_ESTIMATOR: "1"
      TRANSLATION_SKIP_REMOTE_TOKENIZER: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install CI dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: Agent harness validation
        run: |
          python -m unittest scripts.validate_agent_tasks_test
          python scripts/validate_agent_tasks.py

      - name: Translation test suite
        run: |
          python -m unittest discover -s tasks/translation/src -t . -p "*_test.py"

      - name: Sunday Movies offline tests
        run: |
          cd tasks/sunday-movies/src
          python -m unittest ratings.tests.utils_test ratings.tests.test_aggregator
